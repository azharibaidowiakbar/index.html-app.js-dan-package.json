<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WALA AI - Storyboard Studio</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>WALA AI - Storyboard Studio</h1>
        <input type="text" id="topik" placeholder="Masukkan topik storyboard...">
        <button onclick="generateStoryboard()">Generate Storyboard</button>
        <div id="result"></div>
    </div>

    <script>
        async function generateStoryboard() {
            const resultDiv = document.getElementById('result');
            const topik = document.getElementById('topik').value;
            
            resultDiv.innerText = "Sedang membuat storyboard...";

            try {
                // JALUR RELATIF: Ini otomatis akan mengarah ke domain Vercel Anda
                const response = await fetch('/api/generate', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ topikUtama: topik })
                });

                const result = await response.json();
                
                if (result.data) {
                    resultDiv.innerText = result.data;
                } else {
                    resultDiv.innerText = "Error: " + (result.message || "Gagal mendapatkan data");
                }
            } catch (error) {
                resultDiv.innerText = "Gagal terhubung ke server. Pastikan API Key sudah benar.";
                console.error("Error:", error);
            }
        }
    </script>
</body>
</html>
