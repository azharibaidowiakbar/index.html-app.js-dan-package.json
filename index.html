<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WALA AI - Storyboard Studio</title>
    <!-- Path ./style.css memastikan file dibaca di folder yang sama -->
    <link rel="stylesheet" href="./style.css">
</head>
<body>

    <div class="container">
        <h1>WALA AI - Storyboard Studio</h1>
        <input type="text" id="topik" placeholder="Masukkan topik storyboard...">
        <button id="generateBtn">Generate Storyboard</button>
        <div id="result"></div>
    </div>

    <script>
        document.getElementById('generateBtn').onclick = async () => {
            const topik = document.getElementById('topik').value;
            const resDiv = document.getElementById('result');
            if (!topik) return alert("Masukkan topik!");
            
            resDiv.innerText = "Sedang memproses...";
            try {
                const response = await fetch('/api/generate', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ topikUtama: topik })
                });
                const result = await response.json();
                resDiv.innerText = result.data || result.message;
            } catch (error) {
                resDiv.innerText = "Gagal terhubung.";
            }
        };
    </script>
</body>
</html>
